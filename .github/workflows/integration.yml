name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  integration:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "dir=$(pnpm store path)" >> $GITHUB_OUTPUT
        shell: bash

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.dir }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ghostscript \
            python3 \
            make \
            g++ \
            pkg-config \
            libcairo2-dev \
            libpango1.0-dev \
            libjpeg-dev \
            libgif-dev \
            librsvg2-dev

      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install ghostscript --no-progress -y
          $gsBin = Get-ChildItem "C:\Program Files\gs" -Directory |
            Sort-Object Name -Descending |
            Select-Object -First 1 -ExpandProperty FullName
          "$gsBin\bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
        shell: pwsh

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Build native modules (Linux)
        if: runner.os == 'Linux'
        run: pnpm rebuild canvas

      - name: Build CLI
        run: pnpm build

      - name: Run integration tests
        run: pnpm test:integration
